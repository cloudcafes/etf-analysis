name: ETF Analysis

on:
  schedule:
    # 8:00 AM IST → 2:30 UTC
    - cron: "30 2 * * *"
    # 5:00 PM IST → 11:30 UTC
    - cron: "30 11 * * *"

  workflow_dispatch:  # allows manual run

# REQUIRED: Grants the action permission to push code back to your repo
permissions:
  contents: write

jobs:
  run-etf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --upgrade yfinance requests-ratelimiter

      # Ensure this matches the name of your python file
      - name: Run ETF script
        run: |
          python etf_analyzer.py

      # Auto-commits the database back to your GitHub repo so it persists
      - name: Commit and Push DB
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add etf_rotation.db
          
          # This checks if the db changed. If yes, it commits and pushes. If no, it does nothing.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ETF database state" && git push)
