name: ETF Analysis

on:
  schedule:
    # 8:00 AM IST → 2:30 UTC
    - cron: "30 2 * * *"
    # 5:00 PM IST → 11:30 UTC
    - cron: "30 11 * * *"

  workflow_dispatch:  # allows manual run

# REQUIRED: Grants the action permission to push code back to your repo
permissions:
  contents: write

# FIX 5: Concurrency Protection (Prevents two overlapping runs from corrupting the DB)
concurrency:
  group: etf-db-update
  cancel-in-progress: false

jobs:
  run-etf:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --upgrade yfinance requests-ratelimiter pandas sqlalchemy google-genai

      # Ensure this matches the name of your python file
      - name: Run ETF script
        run: |
          python etf_analyzer.py

      # FIX 4: Atomic Git Persistence with Retries & Hard Failure
      - name: Commit and Push DB
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add etf_rotation.db
          
          # Check if there are changes. If no, exit cleanly.
          if git diff --staged --quiet; then
            echo "No database changes to commit."
            exit 0
          fi
          
          git commit -m "Auto-update ETF database state"
          
          # Retry loop for git push to prevent silent data loss on network failure
          max_retries=3
          attempt=1
          success=false
          
          while [ $attempt -le $max_retries ]; do
            echo "Attempt $attempt of $max_retries to push DB changes..."
            if git push; then
              echo "Push successful!"
              success=true
              break
            else
              wait_time=$((2 ** attempt * 5))
              echo "Push failed. Retrying in $wait_time seconds..."
              sleep $wait_time
              attempt=$((attempt + 1))
            fi
          done
          
          if [ "$success" = false ]; then
            echo "Failed to push database to remote after $max_retries attempts. Failing workflow."
            exit 1
          fi
